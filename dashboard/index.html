<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightCrawler Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">
    <div class="logo">NightCrawler</div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Nodes</a>
        <a href="#">Crawler</a>
        <a href="#">Analytics</a>
    </div>
</div>

<div class="main">

    <div class="header">
        <h1>Crawler Dashboard</h1>
        <div class="refresh" id="lastUpdate">
            
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Online Nodes</h3>
            <p id="onlineCount">0</p>
        </div>

        <div class="card">
            <h3>Offline Nodes</h3>
            <p id="offlineCount">0</p>
        </div>

        <div class="card">
            <h3>Total Nodes</h3>
            <p id="totalNodes">0</p>
        </div>
    </div>

    <div class="section">
        <h2>Node Health</h2>
        <div id="status"></div>
    </div>

    <div class="section">
        <h2>Start Crawl</h2>

        <textarea id="urls" rows="6"
            ></textarea>

        <button onclick="crawl()">
            Start Crawl
        </button>

        <div id="results"></div>
    </div>

</div>

<script>

async function loadStatus() {

    const resp = await fetch("http://127.0.0.1:6060/status");
    const data = await resp.json();

    let html = "";

    let online = 0;
    let offline = 0;

    for(const [node,info] of Object.entries(data.all_nodes)){

        if(info.alive) online++;
        else offline++;

        html += `
        <div class="node">
            <div>
                <strong>${node}</strong>
                <div>Port ${info.port}</div>
            </div>

            <div class="status">
                <div class="dot ${info.alive ? 'online' : 'offline'}"></div>
                ${info.alive ? 'ONLINE' : 'OFFLINE'}
            </div>
        </div>
        `;
    }

    document.getElementById("status").innerHTML = html;

    document.getElementById("onlineCount").innerText = online;
    document.getElementById("offlineCount").innerText = offline;
    document.getElementById("totalNodes").innerText =
        online + offline;

    document.getElementById("lastUpdate").innerText =
        "Last updated: " + new Date().toLocaleTimeString();
}

async function crawl(){

    const urls =
        document.getElementById("urls")
        .value
        .split("\n")
        .map(x => x.trim())
        .filter(Boolean);

    document.getElementById("results").innerHTML =
        "⏳ Crawling...";

    const resp = await fetch(
        "http://127.0.0.1:6060/crawl",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({urls})
        }
    );

    const data = await resp.json();

    document.getElementById("results").innerHTML =
        `<pre>${JSON.stringify(data,null,2)}</pre>`;
}

loadStatus();
setInterval(loadStatus,5000);

</script>

</body>
</html>
